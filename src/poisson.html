<div class="container">

<header class="page-header">
    <a class="back-link" href="./index.html">← Back to home</a>
    <h1>Poisson distribution</h1>
    <p> 
        A discrete probability distribution that models the number of times a random, independent event occurs within a fixed interval of time or space
    </p>
</header>

<div class="chart-panel">
    <div id="chart"></div>
</div>

<div class="controls">
    <div class="slider-label">$\lambda$</div>
    <div id="slider_0"></div>
</div>

<div class="formula">
$$
    P(X = k) = \frac{\lambda^k e^{-\lambda}}{k!}, \quad k = 0, 1, 2, \ldots
$$
</div>
</div>
